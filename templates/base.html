<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Otomatika{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='grid.css') }}?v={{ asset_version }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_version }}">
</head>
<body data-page="{{ active }}">

<nav class="cp-navbar py-3">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
    <a href="{{ url_for('home') }}" class="cp-brand">
      <svg class="cp-logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 3 L27 9.5 V22.5 L16 29 L5 22.5 V9.5 Z" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="16" cy="12" r="2.6" fill="currentColor"/>
        <circle cx="10.5" cy="21" r="2.6" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="21.5" cy="21" r="2.6" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M14.3 13.8 L11.9 18.7 M17.7 13.8 L20.1 18.7" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      Otomatika
    </a>
    <div class="page-nav">
      <a href="{{ url_for('home') }}" class="page-nav-link mod0 {{ 'active' if active == 'home' }}"><span class="num">⌂</span>Beranda</a>
      <a href="{{ url_for('tokenizer_page') }}" class="page-nav-link mod1 {{ 'active' if active == 'tokenizer' }}"><span class="num">01</span>Tokenizer</a>
      <a href="{{ url_for('regex_page') }}" class="page-nav-link mod2 {{ 'active' if active == 'regex' }}"><span class="num">02</span>Regex</a>
      <a href="{{ url_for('parser_page') }}" class="page-nav-link mod3 {{ 'active' if active == 'parser' }}"><span class="num">03</span>Parser</a>
      <a href="{{ url_for('cnf_page') }}" class="page-nav-link mod4 {{ 'active' if active == 'cnf' }}"><span class="num">04</span>CNF</a>
      <a href="{{ url_for('panduan_page') }}" class="page-nav-link mod5 {{ 'active' if active == 'panduan' }}"><span class="num">?</span>Panduan</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="cp-footer">
  <div class="container d-flex flex-wrap justify-content-between gap-2">
    <span>Otomatika - Capstone Project Teori Bahasa dan Otomata</span>
    <span>Dibangun dengan Flask, vanilla JS, dan SVG</span>
  </div>
</footer>

<script src="{{ url_for('static', filename='script.js') }}?v={{ asset_version }}"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
